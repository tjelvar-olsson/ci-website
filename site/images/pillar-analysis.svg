  <circle cx="128" cy="234" r="4.5" fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="152" cy="220" r="3.5" fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="170" cy="212" r="4"   fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="192" cy="207" r="3"   fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="212" cy="198" r="5"   fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="235" cy="187" r="3.5" fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="258" cy="178" r="4"   fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="275" cy="172" r="3"   fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
  <circle cx="298" cy="160" r="4.5" fill="#907aa9" fill-opacity="0.6" stroke="#907aa9" stroke-width="1"/>
