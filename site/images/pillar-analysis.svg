  <circle cx="375" cy="120" r="5"   fill="#b4637a" fill-opacity="0.72" stroke="#b4637a" stroke-width="1.5"/>
  <circle cx="392" cy="110" r="4"   fill="#b4637a" fill-opacity="0.72" stroke="#b4637a" stroke-width="1.5"/>
  <circle cx="410" cy="97"  r="5.5" fill="#b4637a" fill-opacity="0.72" stroke="#b4637a" stroke-width="1.5"/>
  <circle cx="430" cy="88"  r="4"   fill="#b4637a" fill-opacity="0.72" stroke="#b4637a" stroke-width="1.5"/>
