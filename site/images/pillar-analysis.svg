<svg viewBox="0 0 480 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Dashed grid lines (vertical) -->
  <line x1="150" y1="35" x2="150" y2="255" stroke="#907aa9" stroke-width="0.75" stroke-opacity="0.18" stroke-dasharray="4,4"/>
  <line x1="230" y1="35" x2="230" y2="255" stroke="#907aa9" stroke-width="0.75" stroke-opacity="0.18" stroke-dasharray="4,4"/>
  <line x1="310" y1="35" x2="310" y2="255" stroke="#907aa9" stroke-width="0.75" stroke-opacity="0.18" stroke-dasharray="4,4"/>
