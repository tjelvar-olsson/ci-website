meta:
  title: "Cyborg Interfaces — Tjelvar Olsson"
  description: >
    Scientific computing for companies whose core business is science.
    I help you build systems that scale, manage your data properly, and
    keep critical technical knowledge out of just one person's head.

nav:
  cta: "Get in touch"

hero:
  heading: "Scientific computing for companies where the science and the engineering have to understand each other."
  sub: >
    I'm Tjelvar Olsson. I work with companies whose core business is science
    — helping them build computing systems that scale, manage their data
    properly, and make sure critical technical knowledge doesn't live in just
    one person's head.
  cta_primary: "Get in touch"
  cta_call: "Book a call"
  cta_linkedin: "LinkedIn"

intersection:
  label: "The intersection"
  heading: "Why the intersection matters"
  body: >
    The value is in the combination. Without understanding the science,
    it's hard to know what shape the computing needs to take. Without
    understanding the computing, it's hard to know how analysis can be
    restructured to run more efficiently. Most specialists are strong on
    one side. I work at both.
  computing:
    label: "Computing"
    body: >
      HPC platforms, workflow orchestration, cloud pipelines. Production-grade
      from the start, not just working on your machine.
  science:
    label: "Science"
    body: >
      Biochemistry PhD from UCL. I read the methods section,
      not just the spec.
  people:
    label: "People"
    body: >
      Every engagement is built around knowledge transfer and documentation
      — so systems run without me once the work is done.

services:
  label: "Services"
  heading: "Three areas where I have a track record"
  sub: >
    I've done this work from the inside of scientific organisations
    — at research institutes, and now independently.

  pillar_1:
    number: "01"
    title: "Computing that scales with the science"
    body_1: >
      Your setup made sense when you started. Since then the data has grown,
      the team has changed, and what worked at the beginning is starting to creak.
      Jobs take longer than they should. Pipelines break when something changes.
      The knowledge of how it all fits together lives in one or two people's heads.
    body_2: >
      I come in, learn the system and the science behind it, and help you build
      something that scales. That sometimes means simplifying. It sometimes means
      accepting that scientific computing genuinely needs a certain amount of
      complexity — but it should be the right complexity, not the kind that's just
      accumulated over time.
    # restored third sentence from the markdown
    note: >
      This is embedded work. I'm with you for months, not days.
      When a project calls for expertise beyond mine, I bring in
      specialists from my network.

  pillar_2:
    number: "02"
    title: "Data that makes sense"
    body_1: >
      Scientific data is only useful if you can find it, trust it, and hand
      it to someone else without a long explanation of the folder structure.
    # restored: "Data management is something I've thought about seriously
    # for a long time." — the sentence that earns "Small, but real."
    body_2: >
      I built dtool — an open-source tool for managing scientific datasets.
      It's been adopted by a group in Germany, and one of their researchers
      is now introducing it to a group in Japan. Small, but real.
      Data management is something I've thought about seriously for a long time.
    # restored: bidirectional translation — both directions, not just one
    body_3: >
      I've also spent time as the person sitting between research teams and
      central computing infrastructure — writing the scientific case for
      hardware investment, translating what the science needs into something
      the engineers can act on, and translating what the engineering can do
      back to the scientists.

  pillar_3:
    number: "03"
    title: "From raw data to answers"
    # restored: "The question is usually specific." — tells the client
    # Tjelvar understands they have a precise question, not a vague one
    body_1: >
      You have image or video data — cells, organisms, agricultural samples,
      materials — and you need to know what's in it. The question is usually
      specific. The challenge is usually the pipeline: getting from raw data
      to a reproducible answer that doesn't require starting from scratch
      every time.
    body_2: >
      I scope these as fixed projects. A short feasibility phase first, so you
      know what you're getting into before committing. Two days of knowledge
      transfer included, so the capability stays with you when the project ends.
    note: "Most projects fall between £4,000 and £8,000."

how_i_work:
  label: "Process"
  heading: "How I work"
  # new key — the opening line from the markdown that was missing entirely
  intro: >
    I'm a consultant, not an employee. My contracts are scoped accordingly.

  fixed_scope:
    title: "Fixed scope or embedded"
    body: >
      For data analysis work, I work to a fixed scope with a defined output.
      For infrastructure work, I work embedded — usually over several months.
      The contract shape follows the work, not the other way around.

  network:
    title: "Specialist network"
    body: >
      I don't know everything. When a project calls for expertise I don't have,
      I bring in people from my network who go deeper in the areas that matter.
      You'll know when I'm doing that.

  knowledge_transfer:
    title: "Knowledge transfer as standard"
    # restored: "and systems that don't depend on me to keep running."
    # — the clause that closes the loop was cut in the yaml version
    body: >
      The goal, especially for embedded work, is to leave things in better
      shape than I found them — properly documented, with onboarding that
      makes sense to the next person, and systems that don't depend on me
      to keep running.

  no_dependency:
    title: "Systems that don't depend on me"
    body: >
      The work should stand up when I'm not around. That means documentation,
      knowledge transfer, and systems whose logic doesn't live only in my head.

