about:
  label: "About"
  name: "Tjelvar Olsson, PhD"
  role: "Scientific computing — bridging science and engineering"

  bio_1: >
    I have a PhD in biochemistry from UCL, and I've spent the years since
    moving toward the computing side of scientific work — not because the
    science stopped mattering, but because the computing is where a lot of
    scientific work gets stuck.

  bio_2: >
    The combination turns out to be useful. Without understanding the science,
    it's hard to know what shape the computing needs to take. Without
    understanding the computing, it's hard to know how analysis can be
    restructured to run more efficiently.

  # restored: "Small, but real." after dtool description; restored dash
  # construction for the book sentence; honest dtool reach (Germany + Japan)
  # bio_3 contains an <a> tag; template renders it with | safe
  bio_3: >-
    I built dtool, a data management tool for scientific datasets — adopted
    by a group in Germany, and one of their researchers is now introducing
    it to a group in Japan. Small, but real. I wrote
    <a href="http://book.biologistsguide2computing.com/" target="_blank" rel="noopener">A Biologist's Guide to Computing</a>
    — freely available, and found by more than 400 people through the mailing
    list alone, with many more arriving via links I've long since lost track of.
    Some of the code has aged badly. The chapters on how to think computationally
    haven't.

  bio_4: >
    I spent time at the John Innes Centre as the interface between the research
    teams and the central computing infrastructure — the person who could explain
    what the science needed to the engineers, and explain what the engineering
    could offer back to the scientists. That's more or less what I still do,
    just independently.

  bio_5: >
    I work with a small number of clients at a time. If your company's core work
    is science and your computing needs to grow up, I'd like to hear about it.

depth_signals:
  label: "Background"
  heading: "Research from the inside"
  sub: >
    I've been a researcher, an author, and an engineer.
    That breadth is the product, not an accident.

  published:
    title: "Published researcher"
    # [FLAG] verify publication count and journal names against your
    # Google Scholar profile before publishing; also confirm the URL below
    body: >
      Peer-reviewed publications spanning computational biology and
      scientific software. I understand what reproducibility means in
      practice because I've been on both sides of a failed replication.
    link_text: "Google Scholar profile →"
    link_url: "https://scholar.google.com/citations?user=C6zQlvoAAAAJ&hl=en"

  author:
    title: "Author"
    # improved: "not to dumb it down" was clunky; this captures the
    # spirit of the book (relatable and written to be read, not tolerated)
    body: >
      I wrote A Biologist's Guide to Computing — available free online.
      Written to be genuinely readable for biologists: the goal was always
      that it would be picked up and finished, not just bookmarked.
    link_text: "Read the book →"
    # [FLAG] confirm this URL is correct
    link_url: "http://book.biologistsguide2computing.com/"

  knowledge_transfer:
    title: "Knowledge transfer"
    # reordered: leads with KT (the principle), then mentions courses
    # as evidence — per the interview, teaching is evidence of KT,
    # not the other way around
    body: >
      Knowledge transfer is built into every project I deliver —
      documentation, onboarding, and time spent making sure the work
      sticks once I'm gone. I've also run training courses in Python,
      Linux, and HPC for researchers at the John Innes Centre.
      Getting the work to stick is part of the work.

  eu:
    title: "EU Horizon participant"
    # [FLAG] "Registered EU Horizon PIC holder" was not verified in our
    # session — restore it here if accurate, otherwise the current
    # wording is the safer claim
    body: >
      Named as data management partner on an active EU Horizon project.
      I understand the data management and governance expectations that
      come with European research funding.

